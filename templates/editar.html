<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Película</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Editar Película</h1>
    </header>
    
    <main>
        <section id="editar-pelicula">
            <h2>Modificar Datos</h2>
            <form action="/actualizar/{{ peli.id }}" method="POST">
                <input type="text" name="titulo" value="{{ peli.titulo }}" required>
                <input type="text" name="director" value="{{ peli.director }}" required>
                <input type="number" name="año" value="{{ peli.año }}" required>
                <button type="submit" class="btn-editar">Actualizar Guardado</button>
            </form>
            <br>
            <a href="/" class="link-volver">Volver al Catálogo sin guardar</a>
        </section>
    </main>

    <footer>
        <p>Desarrollo Web - Proyecto CRUD Completo</p>
    </footer>
</body>
</html>
