<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Películas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Gestor de Películas Retro</h1>
    </header>
    
    <main>
        <section id="agregar-pelicula">
            <h2>Agregar Nueva Película</h2>
            <form action="/agregar" method="POST">
                <input type="text" name="titulo" placeholder="Título" required>
                <input type="text" name="director" placeholder="Director" required>
                <input type="number" name="año" placeholder="Año" required>
                <button type="submit">Guardar</button>
            </form>
        </section>
        <section id="lista-peliculas">
            <h2>Catálogo Actual</h2>
            <ul>
                {% for peli in peliculas %}
                    <li>
                        <strong>{{ peli.titulo }}</strong> ({{ peli.año }}) - Dir: {{ peli.director }}
                    </li>
                {% endfor %}
            </ul>
        </section>
    </main>

    <footer>
        <p>Desarrollo Web - Proyecto CRUD</p>
    </footer>
</body>
</html>
