<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Retro - CRUD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>Cinema Classics</h1>
    </header>
    
    <main>
        <section id="agregar-pelicula">
            <h2>Añadir a la Cartelera</h2>
            <form action="/agregar" method="POST">
                <input type="text" name="titulo" placeholder="Título de la obra" required>
                <input type="text" name="director" placeholder="Director" required>
                <input type="number" name="año" placeholder="Año de estreno" required>
                <button type="submit" class="btn-guardar">Guardar</button>
            </form>
        </section>

        <section id="lista-peliculas">
            <h2>Catálogo Actual</h2>
            <ul>
                {% for peli in peliculas %}
                    <li>
                        <span class="peli-info">
                            <strong>{{ peli.titulo }}</strong> ({{ peli.año }}) <br> 
                            <small>Dir: {{ peli.director }}</small>
                        </span>
                        <div>
                            <a href="/editar/{{ peli.id }}"><button class="btn-editar">Editar</button></a>
                            <button onclick="confirmarEliminacion('{{ peli.id }}')" class="btn-borrar">Borrar</button>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Desarrollo Web - Sistema CRUD de Películas</p>
    </footer>

    <script>
        function confirmarEliminacion(id) {
            let respuesta = confirm("¿Estás seguro de que quieres sacar esta película de la cartelera?");
            if (respuesta) {
                window.location.href = "/eliminar/" + id;
            }
        }
    </script>
</body>
</html>
