<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Películas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>Gestor de Películas Retro</h1>
    </header>
    
    <main>
        <section id="agregar-pelicula">
            <h2>Agregar Nueva Película</h2>
            <form action="/agregar" method="POST">
                <input type="text" name="titulo" placeholder="Título" required>
                <input type="text" name="director" placeholder="Director" required>
                <input type="number" name="año" placeholder="Año" required>
                <button type="submit">Guardar</button>
            </form>
        </section>

        <section id="lista-peliculas">
            <h2>Catálogo Actual</h2>
            <ul>
                {% for peli in peliculas %}
                    <li>
                        <span><strong>{{ peli.titulo }}</strong> ({{ peli.año }}) - Dir: {{ peli.director }}</span>
                        <div>
                            <a href="/editar/{{ peli.id }}"><button class="btn-editar">Editar</button></a>
                            <button onclick="confirmarEliminacion('{{ peli.id }}')" class="btn-borrar">Borrar</button>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        </section>
    </main>

    <footer>
        <p>Desarrollo Web - Proyecto CRUD Completo</p>
    </footer>

    <script>
        function confirmarEliminacion(id) {
            let respuesta = confirm("¿Estás seguro de que quieres eliminar esta película del catálogo?");
            if (respuesta) {
                window.location.href = "/eliminar/" + id;
            }
        }
    </script>
</body>
</html>
